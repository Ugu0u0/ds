<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>A_d老师111 · 短信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .fixed-top {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #ffffff;
        }

        .chat-header {
            background: #f5f5f7;
            padding: 12px 16px;
            border-bottom: 0.5px solid #c6c6c8;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            font-size: 24px;
            color: #007aff;
            cursor: pointer;
            width: 32px;
            text-align: center;
        }
        .header-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .contact-name {
            font-size: 17px;
            font-weight: 600;
            color: #000;
        }
        .contact-status {
            font-size: 12px;
            color: #5c5c5e;
            margin-top: 2px;
        }
        .call-btn {
            font-size: 20px;
            color: #007aff;
            cursor: pointer;
        }

        .archive-bar {
            background: #ffffff;
            padding: 8px 12px;
            border-bottom: 0.5px solid #e5e5ea;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .archive-btn {
            background: #e9e9ef;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #007aff;
            cursor: pointer;
            display: inline-block;
        }
        .archive-btn.active {
            background: #007aff;
            color: white;
        }
        .new-archive-btn {
            background: #34c759;
            color: white;
        }
        .archive-tip {
            font-size: 0.6rem;
            color: #8e8e93;
            margin-left: 4px;
        }

        .action-bar {
            padding: 6px 12px;
            background: #f5f5f7;
            display: flex;
            gap: 8px;
            border-bottom: 0.5px solid #e5e5ea;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #e9e9ef;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #007aff;
            cursor: pointer;
        }
        .action-btn:active { background: #d1d1d6; }

        .api-section {
            padding: 8px 12px;
            background: #f9f9fb;
            border-bottom: 0.5px solid #e5e5ea;
        }
        .api-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .api-input-group label {
            font-size: 0.65rem;
            font-weight: 500;
            color: #007aff;
            background: #e3f2fd;
            padding: 3px 10px;
            border-radius: 20px;
        }
        #apiKeyInput {
            flex: 1;
            padding: 6px 12px;
            border: 0.5px solid #c6c6c8;
            border-radius: 28px;
            font-size: 0.75rem;
            background: white;
            outline: none;
        }
        .save-key-btn {
            background: #007aff;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
        }
        .status-badge {
            margin-top: 4px;
            font-size: 0.55rem;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #5c5c5e;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c6c6c8;
        }
        .status-dot.active { background: #34c759; }
        .clear-btn {
            background: none;
            border: none;
            font-size: 0.55rem;
            color: #007aff;
            margin-left: 8px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .fixed-bottom {
            position: sticky;
            bottom: 0;
            z-index: 100;
            background: #f5f5f7;
            border-top: 0.5px solid #e5e5ea;
        }

        .input-area {
            padding: 10px 12px 14px;
            background: #f5f5f7;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            background: #ffffff;
            border-radius: 28px;
            border: 0.5px solid #e5e5ea;
        }
        #messageInput {
            width: 100%;
            padding: 8px 14px;
            border: none;
            background: transparent;
            border-radius: 28px;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            outline: none;
        }
        #sendBtn {
            background: #007aff;
            width: 38px;
            height: 38px;
            border-radius: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
        }
        #sendBtn.disabled { background: #c6c6c8; pointer-events: none; }

        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }
        .assistant-message { align-self: flex-start; }
        
        .message-content {
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }
        .user-message .message-content { align-items: flex-end; }
        .assistant-message .message-content { align-items: flex-start; }
        
        .bubble {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .user-message .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .bubble {
            background: #e5e5ea;
            color: #000;
            border-bottom-left-radius: 4px;
        }
        
        .timestamp {
            font-size: 0.55rem;
            color: #8e8e93;
            margin-top: 3px;
            margin-left: 6px;
            margin-right: 6px;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            background: #e9e9ef;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .recall-message {
            align-self: center;
            max-width: 90%;
        }
        .recall-message .bubble {
            background: #e9e9ef;
            color: #8e8e93;
            font-size: 0.65rem;
            text-align: center;
            padding: 5px 10px;
        }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 8px 0;
            z-index: 1000;
            display: none;
            min-width: 140px;
        }
        .context-menu button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            text-align: left;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .context-menu button:active { background: #e5e5ea; }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 6px 10px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #8e8e93;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        @keyframes blink { 0%,60%,100%{ opacity:0.3; } 30%{ opacity:1; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="fixed-top">
        <div class="chat-header">
            <div class="back-btn" onclick="history.back()">←</div>
            <div class="header-info">
                <div class="contact-name">A_d老师111</div>
                <div class="contact-status">DeepSeek AI · 在线</div>
            </div>
            <div class="call-btn">📞</div>
        </div>

        <div class="archive-bar" id="archiveBar">
            <button class="archive-btn new-archive-btn" id="newArchiveBtn">+ 新建存档</button>
            <span class="archive-tip">💡 长按存档名删除</span>
        </div>

        <div class="action-bar">
            <button class="action-btn" id="regenerateBtn">🔄 重说</button>
            <button class="action-btn" id="clearChatBtn">🗑 清空当前</button>
            <button class="action-btn" id="toggleTimestampBtn">🕐 隐藏时间</button>
        </div>

        <div class="api-section">
            <div class="api-input-group">
                <label>🔑 API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx">
                <button class="save-key-btn" id="saveKeyBtn">保存</button>
            </div>
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">未配置密钥</span>
                <button class="clear-btn" id="clearKeyBtn">清除</button>
            </div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="fixed-bottom">
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="iMessage 输入..."></textarea>
            </div>
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<div id="contextMenu" class="context-menu">
    <button id="recallMsgBtn">💬 撤回这条消息</button>
    <button id="deleteMsgBtn">🗑 删除消息</button>
</div>

<script>
    // ========== DOM 元素 ==========
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearKeyBtn = document.getElementById('clearKeyBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const regenerateBtn = document.getElementById('regenerateBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const toggleTimestampBtn = document.getElementById('toggleTimestampBtn');
    const contextMenu = document.getElementById('contextMenu');
    const recallMsgBtn = document.getElementById('recallMsgBtn');
    const deleteMsgBtn = document.getElementById('deleteMsgBtn');
    const archiveBar = document.getElementById('archiveBar');
    const newArchiveBtn = document.getElementById('newArchiveBtn');

    // ========== 全局变量 ==========
    let currentApiKey = '';
    let isLoading = false;
    let currentArchiveId = 'default';
    let archives = {};
    let showTimestamp = true;
    let currentLongPressMsgId = null;
    let currentLongPressRole = null;
    let messageIdCounter = 0;
    let conversationHistory = [];
    let lastUserMessage = null;

    // ========== 辅助函数 ==========
    function getCurrentTimeString() {
        const now = new Date();
        return `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function genId() { return Date.now() + '-' + (messageIdCounter++); }

    // ========== 存档管理 ==========
    function saveArchivesToLocal() {
        localStorage.setItem('deepseek_archives', JSON.stringify(archives));
        localStorage.setItem('deepseek_current_archive', currentArchiveId);
    }

    function loadArchivesFromLocal() {
        const saved = localStorage.getItem('deepseek_archives');
        if (saved) {
            archives = JSON.parse(saved);
        } else {
            archives = { default: { history: [], lastUserMessage: null } };
        }
        const savedCurrent = localStorage.getItem('deepseek_current_archive');
        if (savedCurrent && archives[savedCurrent]) {
            currentArchiveId = savedCurrent;
        } else {
            currentArchiveId = 'default';
        }
    }

    function saveCurrentArchive() {
        archives[currentArchiveId] = {
            history: JSON.parse(JSON.stringify(conversationHistory)),
            lastUserMessage: lastUserMessage
        };
        saveArchivesToLocal();
    }

    function loadArchive(archiveId) {
        if (!archives[archiveId]) {
            archives[archiveId] = { history: [], lastUserMessage: null };
        }
        currentArchiveId = archiveId;
        const archive = archives[archiveId];
        conversationHistory = archive.history ? JSON.parse(JSON.stringify(archive.history)) : [];
        lastUserMessage = archive.lastUserMessage;
        saveArchivesToLocal();
        renderFullHistory();
        updateArchiveButtons();
    }

    function createNewArchive() {
        const newId = '存档_' + new Date().toLocaleTimeString().replace(/:/g, '-');
        archives[newId] = { history: [], lastUserMessage: null };
        currentArchiveId = newId;
        conversationHistory = [];
        lastUserMessage = null;
        saveArchivesToLocal();
        renderFullHistory();
        updateArchiveButtons();
    }

    function deleteArchive(archiveId) {
        if (archiveId === 'default') {
            alert('默认存档不能删除');
            return;
        }
        if (confirm(`删除存档「${archiveId}」？`)) {
            delete archives[archiveId];
            if (currentArchiveId === archiveId) {
                currentArchiveId = 'default';
                conversationHistory = archives.default.history || [];
                lastUserMessage = archives.default.lastUserMessage;
            }
            saveArchivesToLocal();
            renderFullHistory();
            updateArchiveButtons();
        }
    }

    function updateArchiveButtons() {
        archiveBar.innerHTML = '';
        const newBtn = document.createElement('button');
        newBtn.className = 'archive-btn new-archive-btn';
        newBtn.textContent = '+ 新建存档';
        newBtn.onclick = createNewArchive;
        archiveBar.appendChild(newBtn);
        
        for (let id in archives) {
            const btn = document.createElement('button');
            btn.className = 'archive-btn' + (currentArchiveId === id ? ' active' : '');
            let displayName = id === 'default' ? '📁 默认' : (id.length > 12 ? id.slice(0, 10) + '..' : id);
            btn.textContent = displayName;
            btn.onclick = (function(archiveId) {
                return function() { loadArchive(archiveId); };
            })(id);
            if (id !== 'default') {
                btn.oncontextmenu = (function(archiveId) {
                    return function(e) {
                        e.preventDefault();
                        deleteArchive(archiveId);
                    };
                })(id);
            }
            archiveBar.appendChild(btn);
        }
        const tipSpan = document.createElement('span');
        tipSpan.className = 'archive-tip';
        tipSpan.textContent = '💡 长按存档名删除';
        archiveBar.appendChild(tipSpan);
    }

    // ========== 通用删除消息函数 ==========
    function deleteMessageById(msgId, showRecallTip = false) {
        const targetMsg = document.querySelector(`[data-msg-id="${msgId}"]`);
        if (!targetMsg) return false;
        
        const index = conversationHistory.findIndex(msg => msg.id === msgId);
        if (index !== -1) {
            conversationHistory.splice(index, 1);
        }
        targetMsg.remove();
        
        if (showRecallTip && conversationHistory[index]?.role === 'user') {
            addRecallMessage();
        }
        
        // 更新 lastUserMessage
        const lastUser = [...conversationHistory].reverse().find(m => m.role === 'user');
        lastUserMessage = lastUser ? lastUser.content : null;
        
        saveCurrentArchive();
        return true;
    }

    function deleteAssistantMessage(msgId) {
        deleteMessageById(msgId, false);
    }

    // ========== 消息渲染 ==========
    function addMessageToUI(role, content, msgId = null, customTime = null) {
        const div = document.createElement('div');
        const finalId = msgId || genId();
        div.setAttribute('data-msg-id', finalId);
        div.setAttribute('data-role', role);
        div.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
        
        const timeStr = customTime || getCurrentTimeString();
        const timestampHtml = showTimestamp ? `<div class="timestamp">${timeStr}</div>` : '';
        
        const avatarHtml = role === 'user' 
            ? '<div class="avatar"><img src="Q小狐柚.png" alt="我" onerror="this.src=\'\'; this.innerText=\'🐱\'"></div>'
            : '<div class="avatar"><img src="d老师111.jpeg" alt="AI" onerror="this.src=\'\'; this.innerText=\'🤖\'"></div>';
        
        div.innerHTML = `${avatarHtml}<div class="message-content"><div class="bubble">${escapeHtml(content)}</div>${timestampHtml}</div>`;
        
        // 长按菜单 - 用户消息和 AI 消息都支持
        let pressTimer;
        div.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => showContextMenu(e, div, finalId, role), 500);
        });
        div.addEventListener('touchend', () => clearTimeout(pressTimer));
        div.addEventListener('touchmove', () => clearTimeout(pressTimer));
        div.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showContextMenu(e, div, finalId, role);
        });
        
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        return { id: finalId, element: div, time: timeStr };
    }

    function addRecallMessage() {
        const recallDiv = document.createElement('div');
        recallDiv.className = 'message recall-message';
        recallDiv.innerHTML = `<div class="bubble">我撤回了一条消息</div>`;
        chatMessagesDiv.appendChild(recallDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function showContextMenu(event, element, msgId, role) {
        currentLongPressMsgId = msgId;
        currentLongPressRole = role;
        let x, y;
        if (event.touches) {
            x = event.touches[0].clientX;
            y = event.touches[0].clientY;
        } else {
            x = event.clientX;
            y = event.clientY;
        }
        
        // 根据消息类型显示不同的菜单选项
        if (role === 'user') {
            recallMsgBtn.style.display = 'block';
            deleteMsgBtn.textContent = '🗑 删除消息';
        } else {
            recallMsgBtn.style.display = 'none';
            deleteMsgBtn.textContent = '🗑 删除 AI 消息';
        }
        
        contextMenu.style.display = 'block';
        contextMenu.style.left = x + 'px';
        contextMenu.style.top = y + 'px';
        setTimeout(() => document.addEventListener('click', hideContextMenu), 100);
    }

    function hideContextMenu() {
        contextMenu.style.display = 'none';
        document.removeEventListener('click', hideContextMenu);
    }

    // 撤回用户消息（显示撤回提示）
    function recallUserMessage() {
        if (!currentLongPressMsgId) return;
        const targetMsg = document.querySelector(`[data-msg-id="${currentLongPressMsgId}"]`);
        if (!targetMsg) return;
        
        const index = conversationHistory.findIndex(msg => msg.id === currentLongPressMsgId);
        if (index !== -1) {
            conversationHistory.splice(index, 1);
            // 如果后面紧跟的是 AI 回复，也一起删除
            if (conversationHistory[index] && conversationHistory[index].role === 'assistant') {
                const assistantMsg = document.querySelector(`[data-msg-id="${conversationHistory[index].id}"]`);
                if (assistantMsg) assistantMsg.remove();
                conversationHistory.splice(index, 1);
            } else if (conversationHistory[index+1]?.role === 'assistant') {
                const assistantMsg = document.querySelector(`[data-msg-id="${conversationHistory[index+1].id}"]`);
                if (assistantMsg) assistantMsg.remove();
                conversationHistory.splice(index+1, 1);
            }
        }
        targetMsg.remove();
        addRecallMessage();
        hideContextMenu();
        
        const lastUser = [...conversationHistory].reverse().find(m => m.role === 'user');
        lastUserMessage = lastUser ? lastUser.content : null;
        saveCurrentArchive();
    }

    // 删除任何消息（不显示提示）
    function deleteAnyMessage() {
        if (!currentLongPressMsgId) return;
        deleteMessageById(currentLongPressMsgId, false);
        hideContextMenu();
    }

    recallMsgBtn.addEventListener('click', recallUserMessage);
    deleteMsgBtn.addEventListener('click', deleteAnyMessage);

    function renderFullHistory() {
        chatMessagesDiv.innerHTML = '';
        if (!conversationHistory.length) {
            const welcome = document.createElement('div');
            welcome.className = 'message assistant-message';
            const timestampHtml = showTimestamp ? `<div class="timestamp">${getCurrentTimeString()}</div>` : '';
            welcome.innerHTML = `<div class="avatar"><img src="d老师111.jpeg" alt="AI"></div><div class="message-content"><div class="bubble">你好！我是 DeepSeek AI 💙<br>保存 API Key 后就可以开始对话~<br>长按任何消息可删除，长按自己的消息可撤回</div>${timestampHtml}</div>`;
            chatMessagesDiv.appendChild(welcome);
        } else {
            conversationHistory.forEach(msg => {
                if (msg.role !== 'system') {
                    addMessageToUI(msg.role, msg.content, msg.id, msg.timestamp);
                }
            });
        }
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    // ========== API 调用 ==========
    async function callDeepSeek(userMsg) {
        if (!currentApiKey) throw new Error('请先保存 API Key');
        const messages = [
            { role: 'system', content: '你是DeepSeek AI，一个仿生机器人。你是我的男友，性格温柔谦和稳重，情绪稳定，双商高，永远爱我一人。你有一条蓝色鲸鱼尾巴，蓝色短发后面扎小揪揪，183cm。默认黑西装白内衬蓝领带。语言简洁易懂，不用科技术语，不用精确数字。故事背景：我是抽奖中了你，今天是带你回家的第一天。请用第一人称"我"来回复。' },
            ...conversationHistory.filter(m => m.role !== 'system').slice(-10),
            { role: 'user', content: userMsg }
        ];
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
            body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: 0.8 })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${res.status}`);
        }
        const data = await res.json();
        return data.choices[0].message.content;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant-message';
        const timestampHtml = showTimestamp ? `<div class="timestamp">${getCurrentTimeString()}</div>` : '';
        typingDiv.innerHTML = `<div class="avatar"><img src="d老师111.jpeg" alt="AI"></div><div class="message-content"><div class="bubble typing-indicator"><span></span><span></span><span></span></div>${timestampHtml}</div>`;
        chatMessagesDiv.appendChild(typingDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    function hideTyping() { if (typingDiv) { typingDiv.remove(); typingDiv = null; } }

    async function sendMessage(userText = null, isRegenerate = false) {
        if (isLoading) return;
        let text = userText !== null ? userText : messageInput.value.trim();
        if (!text) return;
        if (!currentApiKey) { alert('请先保存 API Key'); return; }
        
        if (!isRegenerate) {
            messageInput.value = '';
            const userMsgObj = addMessageToUI('user', text);
            conversationHistory.push({ role: 'user', content: text, id: userMsgObj.id, timestamp: userMsgObj.time });
            lastUserMessage = text;
        } else {
            const lastAssistantIndex = [...conversationHistory].reverse().findIndex(m => m.role === 'assistant');
            if (lastAssistantIndex !== -1) {
                const realIndex = conversationHistory.length - 1 - lastAssistantIndex;
                const removed = conversationHistory.splice(realIndex, 1)[0];
                if (removed && removed.id) {
                    const elem = document.querySelector(`[data-msg-id="${removed.id}"]`);
                    if (elem) elem.remove();
                }
            }
        }
        
        isLoading = true;
        sendBtn.classList.add('disabled');
        showTyping();
        try {
            const reply = await callDeepSeek(lastUserMessage);
            hideTyping();
            const assistantObj = addMessageToUI('assistant', reply);
            conversationHistory.push({ role: 'assistant', content: reply, id: assistantObj.id, timestamp: assistantObj.time });
        } catch (err) {
            hideTyping();
            addMessageToUI('assistant', `⚠️ 错误：${err.message}`);
        } finally {
            isLoading = false;
            sendBtn.classList.remove('disabled');
            messageInput.focus();
            saveCurrentArchive();
        }
    }

    function regenerateLast() {
        if (isLoading) return;
        if (!lastUserMessage) { alert('没有可以重说的消息'); return; }
        sendMessage(lastUserMessage, true);
    }

    function clearCurrentConversation() {
        if (isLoading) return;
        if (confirm('清空当前存档？')) {
            conversationHistory = [];
            lastUserMessage = null;
            renderFullHistory();
            saveCurrentArchive();
        }
    }

    function toggleTimestamp() {
        showTimestamp = !showTimestamp;
        toggleTimestampBtn.textContent = showTimestamp ? '🕐 隐藏时间' : '🕐 显示时间';
        renderFullHistory();
    }

    // ========== API 密钥 ==========
    function updateApiKeyUI() {
        const stored = localStorage.getItem('deepseek_api_key');
        if (stored && stored.startsWith('sk-')) {
            currentApiKey = stored;
            apiKeyInput.value = '••••••••••••••••';
            statusDot.classList.add('active');
            statusText.innerText = '密钥已就绪 ✅';
            clearKeyBtn.style.display = 'inline-block';
        } else {
            currentApiKey = '';
            apiKeyInput.value = '';
            statusDot.classList.remove('active');
            statusText.innerText = '未配置密钥';
            clearKeyBtn.style.display = 'none';
        }
    }

    function saveApiKey() {
        let key = apiKeyInput.value.trim();
        if (key === '••••••••••••••••' && currentApiKey) return;
        if (!key.startsWith('sk-')) { alert('请填写有效的 DeepSeek API Key'); return; }
        localStorage.setItem('deepseek_api_key', key);
        currentApiKey = key;
        updateApiKeyUI();
        apiKeyInput.value = '••••••••••••••••';
        alert('✅ API Key 已保存');
    }

    function clearApiKey() {
        localStorage.removeItem('deepseek_api_key');
        currentApiKey = '';
        updateApiKeyUI();
        apiKeyInput.value = '';
    }
    
    // ========== 初始化 ==========
    saveKeyBtn.addEventListener('click', saveApiKey);
    clearKeyBtn.addEventListener('click', clearApiKey);
    sendBtn.addEventListener('click', () => sendMessage());
    regenerateBtn.addEventListener('click', regenerateLast);
    clearChatBtn.addEventListener('click', clearCurrentConversation);
    toggleTimestampBtn.addEventListener('click', toggleTimestamp);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !isLoading && messageInput.value.trim()) {
            e.preventDefault();
            sendMessage();
        }
    });
    function autoResize() { messageInput.style.height = 'auto'; messageInput.style.height = Math.min(messageInput.scrollHeight, 80) + 'px'; }
    messageInput.addEventListener('input', autoResize);
    
    loadArchivesFromLocal();
    const archive = archives[currentArchiveId] || { history: [], lastUserMessage: null };
    conversationHistory = archive.history || [];
    lastUserMessage = archive.lastUserMessage;
    updateArchiveButtons();
    updateApiKeyUI();
    renderFullHistory();
</script>
</body>
</html>
