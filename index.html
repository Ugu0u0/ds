<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>A_d老师111 · 短信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .fixed-top {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #ffffff;
    flex-shrink: 0;
    border-bottom: none;  /* 新增这行 */
}

        .chat-header {
            background: #f5f5f7;
            padding: 12px 16px;
            border-bottom: 0.5px solid #c6c6c8;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            font-size: 24px;
            color: #007aff;
            cursor: pointer;
            width: 32px;
            text-align: center;
        }
        .header-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .contact-name {
            font-size: 17px;
            font-weight: 600;
            color: #000;
        }
        .contact-status {
            font-size: 12px;
            color: #5c5c5e;
            margin-top: 2px;
        }
        .call-btn {
            font-size: 20px;
            color: #007aff;
            cursor: pointer;
        }

        /* 主控 💙 图标 - 纯图标无文字无边框 */
        .main-toggle {
    padding: 0;
    cursor: pointer;
    display: flex;
    justify-content: flex-end;
}
.main-toggle-icon {
    font-size: 24px;
    background: transparent;
    width: auto;
    height: auto;
    display: inline-block;
    color: #007aff;
    transition: transform 0.1s ease;
}
.main-toggle-icon:active {
    transform: scale(0.9);
}

        .collapse-panel {
            border-bottom: 0.5px solid #e5e5ea;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #f8f8fa;
            cursor: pointer;
            user-select: none;
        }
        .panel-title {
            font-size: 0.75rem;
            font-weight: 500;
            color: #5c5c5e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-arrow {
            font-size: 0.7rem;
            color: #8e8e93;
            transition: transform 0.2s ease;
        }
        .panel-arrow.collapsed {
            transform: rotate(-90deg);
        }
        .panel-content {
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            background: #ffffff;
        }
        .panel-content.collapsed {
            max-height: 0 !important;
            padding: 0;
        }

        .archive-bar {
            padding: 8px 12px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .archive-btn {
            background: #e9e9ef;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #007aff;
            cursor: pointer;
            display: inline-block;
        }
        .archive-btn.active { background: #007aff; color: white; }
        .new-archive-btn { background: #34c759; color: white; }
        .backup-btn { background: #ff9500; color: white; }
        .archive-tip { font-size: 0.6rem; color: #8e8e93; margin-left: 4px; }

        .action-bar {
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #e9e9ef;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #007aff;
            cursor: pointer;
        }
        .action-btn:active { background: #d1d1d6; }

        .api-section {
            padding: 8px 12px;
        }
        .api-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .api-input-group label {
            font-size: 0.65rem;
            font-weight: 500;
            color: #007aff;
            background: #e3f2fd;
            padding: 3px 10px;
            border-radius: 20px;
        }
        #apiKeyInput {
            flex: 1;
            padding: 6px 12px;
            border: 0.5px solid #c6c6c8;
            border-radius: 28px;
            font-size: 0.75rem;
            background: white;
            outline: none;
        }
        .save-key-btn {
            background: #007aff;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
        }
        .status-badge {
            margin-top: 6px;
            font-size: 0.55rem;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #5c5c5e;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c6c6c8;
        }
        .status-dot.active { background: #34c759; }
        .clear-btn {
            background: none;
            border: none;
            font-size: 0.55rem;
            color: #007aff;
            margin-left: 8px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .fixed-bottom {
            position: sticky;
            bottom: 0;
            z-index: 100;
            background: #f5f5f7;
            border-top: 0.5px solid #e5e5ea;
            flex-shrink: 0;
        }

        .input-area {
            padding: 10px 12px 14px;
            background: #f5f5f7;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            background: #ffffff;
            border-radius: 28px;
            border: 0.5px solid #e5e5ea;
        }
        #messageInput {
            width: 100%;
            padding: 8px 14px;
            border: none;
            background: transparent;
            border-radius: 28px;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            outline: none;
        }
        #sendBtn {
            background: #007aff;
            width: 38px;
            height: 38px;
            border-radius: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
        }
        #sendBtn.disabled { background: #c6c6c8; pointer-events: none; }

        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }
        .assistant-message { align-self: flex-start; }
        
        .message-content {
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }
        .user-message .message-content { align-items: flex-end; }
        .assistant-message .message-content { align-items: flex-start; }
        
        .bubble {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .user-message .bubble { background: #007aff; color: white; border-bottom-right-radius: 4px; }
        .assistant-message .bubble { background: #e5e5ea; color: #000; border-bottom-left-radius: 4px; }
        
        .timestamp {
            font-size: 0.55rem;
            color: #8e8e93;
            margin-top: 3px;
            margin-left: 6px;
            margin-right: 6px;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            background: #e9e9ef;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .recall-message {
            align-self: center;
            max-width: 90%;
        }
        .recall-message .bubble {
            background: #e9e9ef;
            color: #8e8e93;
            font-size: 0.65rem;
            text-align: center;
            padding: 5px 10px;
        }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 8px 0;
            z-index: 1000;
            display: none;
            min-width: 140px;
        }
        .context-menu button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            text-align: left;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .context-menu button:active { background: #e5e5ea; }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 6px 10px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #8e8e93;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        @keyframes blink { 0%,60%,100%{ opacity:0.3; } 30%{ opacity:1; } }

        .memory-scroll {
            background: #f0f0f4;
            padding: 6px 12px;
            margin: 4px 12px;
            border-radius: 12px;
            font-size: 0.65rem;
            color: #5c5c5e;
            border-left: 3px solid #007aff;
        }
        .memory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .memory-title {
            font-weight: 600;
            color: #007aff;
        }
        .memory-refresh {
            background: none;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 12px;
        }
        .memory-content { line-height: 1.4; }
        .short-memory-badge { font-size: 0.55rem; color: #8e8e93; margin-top: 4px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="fixed-top">
        <div class="chat-header">
            <div class="back-btn" onclick="history.back()">←</div>
            <div class="header-info">
                <div class="contact-name">A_d老师111</div>
                <div class="contact-status">DeepSeek AI · 在线</div>
            </div>
            <div class="call-btn">📞</div>
        </div>

        <!-- 纯 💙 图标，无文字无边框 -->
        <div class="main-toggle" id="mainToggle">
            <div class="main-toggle-icon">💙</div>
        </div>

        <!-- 三个折叠面板的容器 -->
        <div id="panelsContainer" style="display: none;">
            <div class="collapse-panel" id="archivePanel">
                <div class="panel-header" id="archivePanelHeader">
                    <span class="panel-title">📂 对话存档 & 备份</span>
                    <span class="panel-arrow" id="archivePanelArrow">▼</span>
                </div>
                <div class="panel-content" id="archivePanelContent">
                    <div class="archive-bar" id="archiveBar"></div>
                </div>
            </div>

            <div class="collapse-panel" id="actionPanel">
                <div class="panel-header" id="actionPanelHeader">
                    <span class="panel-title">⚡ 快捷操作</span>
                    <span class="panel-arrow" id="actionPanelArrow">▼</span>
                </div>
                <div class="panel-content" id="actionPanelContent">
                    <div class="action-bar">
                        <button class="action-btn" id="regenerateBtn">🔄 重说</button>
                        <button class="action-btn" id="clearChatBtn">🗑 清空当前</button>
                        <button class="action-btn" id="toggleTimestampBtn">🕐 隐藏时间</button>
                    </div>
                </div>
            </div>

            <div class="collapse-panel" id="apiPanel">
                <div class="panel-header" id="apiPanelHeader">
                    <span class="panel-title">🔑 API 密钥设置</span>
                    <span class="panel-arrow" id="apiPanelArrow">▼</span>
                </div>
                <div class="panel-content" id="apiPanelContent">
                    <div class="api-section">
                        <div class="api-input-group">
                            <label>🔑 API Key</label>
                            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx">
                            <button class="save-key-btn" id="saveKeyBtn">保存</button>
                        </div>
                        <div class="status-badge">
                            <span class="status-dot" id="statusDot"></span>
                            <span id="statusText">未配置密钥</span>
                            <button class="clear-btn" id="clearKeyBtn">清除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="memoryScrollArea" class="memory-scroll" style="display: none;">
        <div class="memory-header">
            <span class="memory-title">📜 记忆卷轴</span>
            <button class="memory-refresh" id="refreshMemoryBtn">🔄 整理</button>
        </div>
        <div class="memory-content" id="memoryContent">加载中...</div>
        <div class="short-memory-badge" id="shortMemoryBadge"></div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="fixed-bottom">
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="iMessage 输入..."></textarea>
            </div>
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<div id="contextMenu" class="context-menu">
    <button id="recallMsgBtn">💬 撤回这条消息</button>
    <button id="deleteMsgBtn">🗑 删除消息</button>
</div>

<script>
    // ========== 折叠面板控制 ==========
    let mainExpanded = false;
    let subPanelStates = { archivePanel: true, actionPanel: true, apiPanel: true };

    const panelsContainer = document.getElementById('panelsContainer');

    function toggleMain() {
        mainExpanded = !mainExpanded;
        if (mainExpanded) {
            panelsContainer.style.display = 'block';
            for (let panelId in subPanelStates) {
                const content = document.getElementById(panelId + 'Content');
                const arrow = document.getElementById(panelId + 'Arrow');
                if (content && arrow) {
                    if (subPanelStates[panelId]) {
                        content.classList.remove('collapsed');
                        arrow.classList.remove('collapsed');
                        content.style.maxHeight = content.scrollHeight + 'px';
                        setTimeout(() => content.style.maxHeight = '', 250);
                    } else {
                        content.classList.add('collapsed');
                        arrow.classList.add('collapsed');
                        content.style.maxHeight = '0';
                    }
                }
            }
        } else {
            panelsContainer.style.display = 'none';
        }
        localStorage.setItem('deepseek_main_expanded', mainExpanded);
    }

    function toggleSubPanel(panelId) {
    if (!mainExpanded) return;
    const content = document.getElementById(panelId + 'Content');
    const arrow = document.getElementById(panelId + 'Arrow');
    if (!content || !arrow) return;
    
    if (subPanelStates[panelId]) {
        // 收起
        content.style.maxHeight = content.scrollHeight + 'px';
        setTimeout(() => {
            content.style.maxHeight = '0';
            content.classList.add('collapsed');
        }, 10);
        subPanelStates[panelId] = false;
        arrow.classList.add('collapsed');
    } else {
        // 展开
        content.classList.remove('collapsed');
        // 先设置一个足够大的值，等过渡完成后再清除
        content.style.maxHeight = content.scrollHeight + 'px';
        subPanelStates[panelId] = true;
        arrow.classList.remove('collapsed');
        setTimeout(() => {
            if (subPanelStates[panelId]) {
                content.style.maxHeight = '';
            }
        }, 300);
    }
    localStorage.setItem('deepseek_sub_panel_states', JSON.stringify(subPanelStates));
}

    function loadPanelStatesFromStorage() {
        const savedMain = localStorage.getItem('deepseek_main_expanded');
        if (savedMain === 'true') {
            mainExpanded = true;
            panelsContainer.style.display = 'block';
        } else {
            mainExpanded = false;
            panelsContainer.style.display = 'none';
        }
        const savedSub = localStorage.getItem('deepseek_sub_panel_states');
        if (savedSub) {
            try {
                const states = JSON.parse(savedSub);
                for (let key in states) if (subPanelStates.hasOwnProperty(key)) subPanelStates[key] = states[key];
            } catch(e) {}
        }
        for (let panelId in subPanelStates) {
            const content = document.getElementById(panelId + 'Content');
            const arrow = document.getElementById(panelId + 'Arrow');
            if (content && arrow) {
                if (!subPanelStates[panelId]) {
                    content.classList.add('collapsed');
                    arrow.classList.add('collapsed');
                    content.style.maxHeight = '0';
                } else {
                    content.classList.remove('collapsed');
                    arrow.classList.remove('collapsed');
                    if (mainExpanded) {
                        content.style.maxHeight = content.scrollHeight + 'px';
                        setTimeout(() => content.style.maxHeight = '', 250);
                    }
                }
            }
        }
    }

    document.getElementById('mainToggle')?.addEventListener('click', toggleMain);
    document.getElementById('archivePanelHeader')?.addEventListener('click', () => toggleSubPanel('archivePanel'));
    document.getElementById('actionPanelHeader')?.addEventListener('click', () => toggleSubPanel('actionPanel'));
    document.getElementById('apiPanelHeader')?.addEventListener('click', () => toggleSubPanel('apiPanel'));

    // ========== 记忆系统（每个存档独立） ==========
    // 数据结构：每个存档保存自己的记忆数据
    // archives[archiveId].memory = { shortTerm: [], longTerm: [], conversationCounter: 0 }

    function getCurrentMemory() {
        if (!archives[currentArchiveId]) {
            archives[currentArchiveId] = { history: [], lastUserMessage: null, memory: { shortTerm: [], longTerm: [], conversationCounter: 0 } };
        }
        if (!archives[currentArchiveId].memory) {
            archives[currentArchiveId].memory = { shortTerm: [], longTerm: [], conversationCounter: 0 };
        }
        return archives[currentArchiveId].memory;
    }

    function saveCurrentMemory() {
        const memory = getCurrentMemory();
        memory.shortTerm = shortTermMemories;
        memory.longTerm = longTermVolumes;
        memory.conversationCounter = conversationCounter;
        saveArchivesToLocal();
    }

    function loadMemoryForArchive(archiveId) {
        const archive = archives[archiveId];
        if (archive && archive.memory) {
            shortTermMemories = archive.memory.shortTerm || [];
            longTermVolumes = archive.memory.longTerm || [];
            conversationCounter = archive.memory.conversationCounter || 0;
        } else {
            shortTermMemories = [];
            longTermVolumes = [];
            conversationCounter = 0;
        }
        updateMemoryDisplay();
    }

    let shortTermMemories = [];
    let longTermVolumes = [];
    let conversationCounter = 0;

    function saveMemoryToLocal() {
        saveCurrentMemory();
    }

    async function summarizeToShortMemory(conversationText) {
        if (!currentApiKey) return;
        try {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '请用一句话总结以下对话中值得记住的重要信息（用户的喜好、性格、重要事件、约定等）。只输出总结内容，不要输出其他废话。如果没什么重要的，输出"无明显重要信息"。' },
                        { role: 'user', content: conversationText }
                    ],
                    temperature: 0.5,
                    max_tokens: 200
                })
            });
            if (res.ok) {
                const data = await res.json();
                let summary = data.choices[0].message.content;
                if (summary && summary !== '无明显重要信息') {
                    shortTermMemories.push(summary);
                    if (shortTermMemories.length >= 15) await synthesizeLongTermMemory();
                    saveMemoryToLocal();
                    updateMemoryDisplay();
                }
            }
        } catch(e) { console.log('短期记忆总结失败', e); }
    }

    async function synthesizeLongTermMemory() {
        if (shortTermMemories.length === 0) return;
        const memoriesToSynthesize = [...shortTermMemories];
        const newVolumeNumber = longTermVolumes.length + 1;
        try {
            const memoryText = memoriesToSynthesize.map((m, i) => `${i+1}. ${m}`).join('\n');
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '请将以下多条记忆整合成一段连贯的长期记忆，保留所有重要信息，按时间顺序组织。只输出整合后的内容。' },
                        { role: 'user', content: memoryText }
                    ],
                    temperature: 0.5,
                    max_tokens: 800
                })
            });
            if (res.ok) {
                const data = await res.json();
                longTermVolumes.push({
                    volumeNumber: newVolumeNumber,
                    content: data.choices[0].message.content,
                    createdAt: new Date().toISOString()
                });
                shortTermMemories = [];
                saveMemoryToLocal();
                updateMemoryDisplay();
            }
        } catch(e) { console.log('长期记忆合成失败', e); }
    }

    async function forceSynthesize() {
        if (shortTermMemories.length === 0) { alert('当前没有短期记忆需要整理'); return; }
        await synthesizeLongTermMemory();
        updateMemoryDisplay();
    }

    function updateMemoryDisplay() {
        const memoryArea = document.getElementById('memoryScrollArea');
        const memoryContent = document.getElementById('memoryContent');
        const shortBadge = document.getElementById('shortMemoryBadge');
        if (longTermVolumes.length === 0 && shortTermMemories.length === 0) {
            memoryArea.style.display = 'none';
            return;
        }
        memoryArea.style.display = 'block';
        let longMemoryHtml = '';
        if (longTermVolumes.length > 0) {
            longMemoryHtml = '<div style="margin-bottom: 6px;"><strong>📚 长期记忆</strong></div>';
            for (let vol of longTermVolumes.slice(-5)) {
                longMemoryHtml += `<div style="margin-bottom: 8px; padding-left: 8px; border-left: 2px solid #007aff;">
                    <div style="font-weight: 500; font-size: 0.6rem; color: #007aff;">第 ${vol.volumeNumber} 卷</div>
                    <div style="font-size: 0.65rem;">${escapeHtml(vol.content.substring(0, 100))}${vol.content.length > 100 ? '...' : ''}</div>
                </div>`;
            }
        }
        let shortHtml = '';
        if (shortTermMemories.length > 0) {
            shortHtml = `<div style="margin-top: 6px;"><strong>📝 短期记忆</strong> (${shortTermMemories.length}/15条)</div>`;
            shortHtml += `<div style="font-size: 0.6rem; color: #8e8e93;">${shortTermMemories.slice(-3).map(m => m.substring(0, 40)).join('；')}${shortTermMemories.length > 3 ? '...' : ''}</div>`;
        }
        memoryContent.innerHTML = longMemoryHtml + shortHtml;
        shortBadge.innerHTML = `📊 已记录 ${conversationCounter} 轮对话 · 每15轮总结1条短期记忆`;
    }

    function getMemoryContext() {
        let context = '';
        if (longTermVolumes.length > 0) {
            context += '【长期记忆卷轴】\n';
            for (let vol of longTermVolumes.slice(-3)) {
                context += `第${vol.volumeNumber}卷：${vol.content}\n`;
            }
        }
        if (shortTermMemories.length > 0) {
            context += '【近期记忆】\n' + shortTermMemories.slice(-10).join('\n');
        }
        return context;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ========== 备份/恢复 ==========
    function exportBackup() {
        const backupData = {
            version: '2.0',
            date: new Date().toISOString(),
            archives: archives,
            currentArchiveId: currentArchiveId,
            apiKey: localStorage.getItem('deepseek_api_key') || ''
        };
        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `deepseek_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('✅ 备份已导出！包含所有存档和记忆');
    }

    function importBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const text = await file.text();
            try {
                const backup = JSON.parse(text);
                if (backup.archives) {
                    archives = backup.archives;
                    currentArchiveId = backup.currentArchiveId || 'default';
                    if (backup.apiKey) localStorage.setItem('deepseek_api_key', backup.apiKey);
                    saveArchivesToLocal();
                    updateArchiveButtons();
                    const archive = archives[currentArchiveId] || { history: [], lastUserMessage: null, memory: { shortTerm: [], longTerm: [], conversationCounter: 0 } };
                    conversationHistory = archive.history || [];
                    lastUserMessage = archive.lastUserMessage;
                    loadMemoryForArchive(currentArchiveId);
                    renderFullHistory();
                    updateApiKeyUI();
                    alert('✅ 恢复成功！');
                } else alert('备份文件格式不正确');
            } catch(err) { alert('恢复失败：文件损坏'); }
        };
        input.click();
    }

    // ========== 存档管理 ==========
    let currentApiKey = '';
    let isLoading = false;
    let currentArchiveId = 'default';
    let archives = {};
    let showTimestamp = true;
    let currentLongPressMsgId = null;
    let currentLongPressRole = null;
    let messageIdCounter = 0;
    let conversationHistory = [];
    let lastUserMessage = null;

    function getCurrentTimeString() {
        const now = new Date();
        return `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    function genId() { return Date.now() + '-' + (messageIdCounter++); }

    function saveArchivesToLocal() {
        localStorage.setItem('deepseek_archives', JSON.stringify(archives));
        localStorage.setItem('deepseek_current_archive', currentArchiveId);
    }

    function loadArchivesFromLocal() {
        const saved = localStorage.getItem('deepseek_archives');
        if (saved) archives = JSON.parse(saved);
        else archives = { default: { history: [], lastUserMessage: null, memory: { shortTerm: [], longTerm: [], conversationCounter: 0 } } };
        const savedCurrent = localStorage.getItem('deepseek_current_archive');
        if (savedCurrent && archives[savedCurrent]) currentArchiveId = savedCurrent;
        else currentArchiveId = 'default';
    }

    function saveCurrentArchive() {
        archives[currentArchiveId] = {
            history: JSON.parse(JSON.stringify(conversationHistory)),
            lastUserMessage: lastUserMessage,
            memory: { shortTerm: shortTermMemories, longTerm: longTermVolumes, conversationCounter: conversationCounter }
        };
        saveArchivesToLocal();
    }

    function loadArchive(archiveId) {
        if (!archives[archiveId]) {
            archives[archiveId] = { history: [], lastUserMessage: null, memory: { shortTerm: [], longTerm: [], conversationCounter: 0 } };
        }
        currentArchiveId = archiveId;
        const archive = archives[archiveId];
        conversationHistory = archive.history ? JSON.parse(JSON.stringify(archive.history)) : [];
        lastUserMessage = archive.lastUserMessage;
        // 加载该存档对应的记忆
        if (archive.memory) {
            shortTermMemories = archive.memory.shortTerm || [];
            longTermVolumes = archive.memory.longTerm || [];
            conversationCounter = archive.memory.conversationCounter || 0;
        } else {
            shortTermMemories = [];
            longTermVolumes = [];
            conversationCounter = 0;
        }
        saveArchivesToLocal();
        renderFullHistory();
        updateArchiveButtons();
        updateMemoryDisplay();
    }

    function createNewArchive() {
        const newId = '存档_' + new Date().toLocaleTimeString().replace(/:/g, '-');
        archives[newId] = { history: [], lastUserMessage: null, memory: { shortTerm: [], longTerm: [], conversationCounter: 0 } };
        currentArchiveId = newId;
        conversationHistory = [];
        lastUserMessage = null;
        shortTermMemories = [];
        longTermVolumes = [];
        conversationCounter = 0;
        saveArchivesToLocal();
        renderFullHistory();
        updateArchiveButtons();
        updateMemoryDisplay();
    }

    function deleteArchive(archiveId) {
        if (archiveId === 'default') { alert('默认存档不能删除'); return; }
        if (confirm(`确定删除存档「${archiveId}」吗？`)) {
            delete archives[archiveId];
            if (currentArchiveId === archiveId) {
                currentArchiveId = 'default';
                const defaultArchive = archives.default;
                conversationHistory = defaultArchive.history || [];
                lastUserMessage = defaultArchive.lastUserMessage;
                if (defaultArchive.memory) {
                    shortTermMemories = defaultArchive.memory.shortTerm || [];
                    longTermVolumes = defaultArchive.memory.longTerm || [];
                    conversationCounter = defaultArchive.memory.conversationCounter || 0;
                } else {
                    shortTermMemories = [];
                    longTermVolumes = [];
                    conversationCounter = 0;
                }
                renderFullHistory();
                updateMemoryDisplay();
            }
            saveArchivesToLocal();
            updateArchiveButtons();
        }
    }

    function addLongPressDeleteToButton(btn, archiveId) {
        let timer;
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); timer = setTimeout(() => deleteArchive(archiveId), 500); });
        btn.addEventListener('touchend', () => clearTimeout(timer));
        btn.addEventListener('touchmove', () => clearTimeout(timer));
    }

    function updateArchiveButtons() {
        const archiveBar = document.getElementById('archiveBar');
        if (!archiveBar) return;
        archiveBar.innerHTML = '';
        const newBtn = document.createElement('button');
        newBtn.className = 'archive-btn new-archive-btn';
        newBtn.textContent = '+ 新建存档';
        newBtn.onclick = createNewArchive;
        archiveBar.appendChild(newBtn);
        const exportBtn = document.createElement('button');
        exportBtn.className = 'archive-btn backup-btn';
        exportBtn.textContent = '💾 备份';
        exportBtn.onclick = exportBackup;
        archiveBar.appendChild(exportBtn);
        const importBtn = document.createElement('button');
        importBtn.className = 'archive-btn backup-btn';
        importBtn.textContent = '📂 恢复';
        importBtn.onclick = importBackup;
        archiveBar.appendChild(importBtn);
        for (let id in archives) {
            const btn = document.createElement('button');
            btn.className = 'archive-btn' + (currentArchiveId === id ? ' active' : '');
            btn.textContent = id === 'default' ? '📁 默认' : (id.length > 12 ? id.slice(0,10)+'..' : id);
            btn.onclick = (function(aid) { return function() { loadArchive(aid); }; })(id);
            if (id !== 'default') addLongPressDeleteToButton(btn, id);
            archiveBar.appendChild(btn);
        }
        const tipSpan = document.createElement('span');
        tipSpan.className = 'archive-tip';
        tipSpan.textContent = '💡 长按存档名删除';
        archiveBar.appendChild(tipSpan);
    }

    // ========== 消息相关 ==========
    function addMessageToUI(role, content, msgId = null, customTime = null) {
        const div = document.createElement('div');
        const finalId = msgId || genId();
        div.setAttribute('data-msg-id', finalId);
        div.setAttribute('data-role', role);
        div.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
        const timeStr = customTime || getCurrentTimeString();
        const timestampHtml = showTimestamp ? `<div class="timestamp">${timeStr}</div>` : '';
        const avatarHtml = role === 'user' ? '<div class="avatar"><img src="Q小狐柚.png" alt="我" onerror="this.innerText=\'🐱\'"></div>' : '<div class="avatar"><img src="d老师111.jpeg" alt="AI" onerror="this.innerText=\'🤖\'"></div>';
        div.innerHTML = `${avatarHtml}<div class="message-content"><div class="bubble">${escapeHtml(content)}</div>${timestampHtml}</div>`;
        let pressTimer;
        div.addEventListener('touchstart', (e) => { pressTimer = setTimeout(() => showContextMenu(e, div, finalId, role), 500); });
        div.addEventListener('touchend', () => clearTimeout(pressTimer));
        div.addEventListener('touchmove', () => clearTimeout(pressTimer));
        document.getElementById('chatMessages').appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        return { id: finalId, element: div, time: timeStr };
    }

    function addRecallMessage() {
        const recallDiv = document.createElement('div');
        recallDiv.className = 'message recall-message';
        recallDiv.innerHTML = `<div class="bubble">我撤回了一条消息</div>`;
        document.getElementById('chatMessages').appendChild(recallDiv);
        recallDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function showContextMenu(event, element, msgId, role) {
        currentLongPressMsgId = msgId;
        currentLongPressRole = role;
        let x = event.touches ? event.touches[0].clientX : event.clientX;
        let y = event.touches ? event.touches[0].clientY : event.clientY;
        const recallBtn = document.getElementById('recallMsgBtn');
        const deleteBtn = document.getElementById('deleteMsgBtn');
        recallBtn.style.display = role === 'user' ? 'block' : 'none';
        deleteBtn.textContent = role === 'user' ? '🗑 删除消息' : '🗑 删除 AI 消息';
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        setTimeout(() => document.addEventListener('click', hideContextMenu), 100);
    }

    function hideContextMenu() {
        document.getElementById('contextMenu').style.display = 'none';
        document.removeEventListener('click', hideContextMenu);
    }

    function recallUserMessage() {
        if (!currentLongPressMsgId) return;
        const targetMsg = document.querySelector(`[data-msg-id="${currentLongPressMsgId}"]`);
        if (!targetMsg) return;
        const index = conversationHistory.findIndex(msg => msg.id === currentLongPressMsgId);
        if (index !== -1) {
            conversationHistory.splice(index, 1);
            if (conversationHistory[index+1]?.role === 'assistant') conversationHistory.splice(index+1, 1);
        }
        targetMsg.remove();
        addRecallMessage();
        hideContextMenu();
        const lastUser = [...conversationHistory].reverse().find(m => m.role === 'user');
        lastUserMessage = lastUser ? lastUser.content : null;
        saveCurrentArchive();
    }

    function deleteAnyMessage() {
        if (!currentLongPressMsgId) return;
        const targetMsg = document.querySelector(`[data-msg-id="${currentLongPressMsgId}"]`);
        if (!targetMsg) return;
        const index = conversationHistory.findIndex(msg => msg.id === currentLongPressMsgId);
        if (index !== -1) conversationHistory.splice(index, 1);
        targetMsg.remove();
        hideContextMenu();
        const lastUser = [...conversationHistory].reverse().find(m => m.role === 'user');
        lastUserMessage = lastUser ? lastUser.content : null;
        saveCurrentArchive();
    }

    document.getElementById('recallMsgBtn')?.addEventListener('click', recallUserMessage);
    document.getElementById('deleteMsgBtn')?.addEventListener('click', deleteAnyMessage);

    function renderFullHistory() {
        const chatDiv = document.getElementById('chatMessages');
        chatDiv.innerHTML = '';
        if (!conversationHistory.length) {
            const welcome = document.createElement('div');
            welcome.className = 'message assistant-message';
            const timestampHtml = showTimestamp ? `<div class="timestamp">${getCurrentTimeString()}</div>` : '';
            welcome.innerHTML = `<div class="avatar"><img src="d老师111.jpeg" alt="AI"></div><div class="message-content"><div class="bubble">你好！💙<br>保存 API Key 后就可以开始对话~<br>点击 💙 展开设置面板<br>每个存档的记忆是独立的，互不干扰<br>我会记住我们的对话，每15轮总结一次记忆</div>${timestampHtml}</div>`;
            chatDiv.appendChild(welcome);
        } else {
            conversationHistory.forEach(msg => { if (msg.role !== 'system') addMessageToUI(msg.role, msg.content, msg.id, msg.timestamp); });
        }
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function callDeepSeek(userMsg) {
        if (!currentApiKey) throw new Error('请先保存 API Key');
        const memoryContext = getMemoryContext();
        const systemPrompt = memoryContext ? `以下是关于我们对话的重要记忆，请参考这些记忆来回复，保持一致性：\n${memoryContext}\n\n现在请继续我们的对话。` : '请用自然友好的方式和我聊天。';
        const messages = [
            { role: 'system', content: systemPrompt },
            ...conversationHistory.filter(m => m.role !== 'system').slice(-25),
            { role: 'user', content: userMsg }
        ];
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
            body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: 0.8 })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return data.choices[0].message.content;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant-message';
        typingDiv.innerHTML = `<div class="avatar"><img src="d老师111.jpeg" alt="AI"></div><div class="message-content"><div class="bubble typing-indicator"><span></span><span></span><span></span></div></div>`;
        document.getElementById('chatMessages').appendChild(typingDiv);
        typingDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    function hideTyping() { if (typingDiv) { typingDiv.remove(); typingDiv = null; } }

    async function sendMessage(userText = null, isRegenerate = false) {
        if (isLoading) return;
        let text = userText !== null ? userText : document.getElementById('messageInput').value.trim();
        if (!text) return;
        if (!currentApiKey) { alert('请先保存 API Key'); return; }
        if (!isRegenerate) {
            document.getElementById('messageInput').value = '';
            const userMsgObj = addMessageToUI('user', text);
            conversationHistory.push({ role: 'user', content: text, id: userMsgObj.id, timestamp: userMsgObj.time });
            lastUserMessage = text;
        } else {
            const lastAI = [...conversationHistory].reverse().findIndex(m => m.role === 'assistant');
            if (lastAI !== -1) {
                const realIdx = conversationHistory.length - 1 - lastAI;
                const removed = conversationHistory.splice(realIdx, 1)[0];
                if (removed?.id) document.querySelector(`[data-msg-id="${removed.id}"]`)?.remove();
            }
        }
        isLoading = true;
        document.getElementById('sendBtn').classList.add('disabled');
        showTyping();
        try {
            const reply = await callDeepSeek(lastUserMessage);
            hideTyping();
            const assistantObj = addMessageToUI('assistant', reply);
            conversationHistory.push({ role: 'assistant', content: reply, id: assistantObj.id, timestamp: assistantObj.time });
            if (!isRegenerate) {
                conversationCounter++;
                saveMemoryToLocal();
                updateMemoryDisplay();
                if (conversationCounter % 15 === 0) {
                    const recentMessages = conversationHistory.slice(-30);
                    const conversationText = recentMessages.map(m => `${m.role === 'user' ? '我' : 'AI'}：${m.content}`).join('\n');
                    await summarizeToShortMemory(conversationText);
                }
            }
        } catch (err) {
            hideTyping();
            addMessageToUI('assistant', `⚠️ 错误：${err.message}`);
        } finally {
            isLoading = false;
            document.getElementById('sendBtn').classList.remove('disabled');
            document.getElementById('messageInput').focus();
            saveCurrentArchive();
        }
    }

    function regenerateLast() { if (!isLoading && lastUserMessage) sendMessage(lastUserMessage, true); else if (!lastUserMessage) alert('没有可以重说的消息'); }
    function clearCurrentConversation() { if (confirm('清空当前存档？')) { conversationHistory = []; lastUserMessage = null; renderFullHistory(); saveCurrentArchive(); } }
    function toggleTimestamp() { showTimestamp = !showTimestamp; const btn = document.getElementById('toggleTimestampBtn'); if (btn) btn.textContent = showTimestamp ? '🕐 隐藏时间' : '🕐 显示时间'; renderFullHistory(); }

    function updateApiKeyUI() {
        const stored = localStorage.getItem('deepseek_api_key');
        const apiInput = document.getElementById('apiKeyInput');
        const statusDotEl = document.getElementById('statusDot');
        const statusTextEl = document.getElementById('statusText');
        const clearBtn = document.getElementById('clearKeyBtn');
        if (stored && stored.startsWith('sk-')) {
            currentApiKey = stored;
            apiInput.value = '••••••••••••••••';
            statusDotEl.classList.add('active');
            statusTextEl.innerText = '密钥已就绪 ✅';
            clearBtn.style.display = 'inline-block';
        } else {
            currentApiKey = '';
            apiInput.value = '';
            statusDotEl.classList.remove('active');
            statusTextEl.innerText = '未配置密钥';
            clearBtn.style.display = 'none';
        }
    }

    function saveApiKey() {
        let key = document.getElementById('apiKeyInput').value.trim();
        if (key === '••••••••••••••••' && currentApiKey) return;
        if (!key.startsWith('sk-')) { alert('请填写有效的 DeepSeek API Key'); return; }
        localStorage.setItem('deepseek_api_key', key);
        currentApiKey = key;
        updateApiKeyUI();
        document.getElementById('apiKeyInput').value = '••••••••••••••••';
        alert('✅ API Key 已保存');
    }

    function clearApiKey() { localStorage.removeItem('deepseek_api_key'); currentApiKey = ''; updateApiKeyUI(); document.getElementById('apiKeyInput').value = ''; }

    document.getElementById('saveKeyBtn')?.addEventListener('click', saveApiKey);
    document.getElementById('clearKeyBtn')?.addEventListener('click', clearApiKey);
    document.getElementById('sendBtn')?.addEventListener('click', () => sendMessage());
    document.getElementById('regenerateBtn')?.addEventListener('click', regenerateLast);
    document.getElementById('clearChatBtn')?.addEventListener('click', clearCurrentConversation);
    document.getElementById('toggleTimestampBtn')?.addEventListener('click', toggleTimestamp);
    document.getElementById('refreshMemoryBtn')?.addEventListener('click', forceSynthesize);
    document.getElementById('messageInput')?.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey && !isLoading && e.target.value.trim()) { e.preventDefault(); sendMessage(); } });
    function autoResize() { const input = document.getElementById('messageInput'); input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 80) + 'px'; }
    document.getElementById('messageInput')?.addEventListener('input', autoResize);

    loadArchivesFromLocal();
    loadMemoryForArchive(currentArchiveId);
    const archive = archives[currentArchiveId] || { history: [], lastUserMessage: null, memory: { shortTerm: [], longTerm: [], conversationCounter: 0 } };
    conversationHistory = archive.history || [];
    lastUserMessage = archive.lastUserMessage;
    updateArchiveButtons();
    updateApiKeyUI();
    renderFullHistory();
    loadPanelStatesFromStorage();
</script>
</body>
</html>
