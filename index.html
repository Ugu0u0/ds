<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>A_d老师111 · 短信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部导航栏 - 短信风格 */
        .chat-header {
            background: #f5f5f7;
            padding: 12px 16px;
            border-bottom: 0.5px solid #c6c6c8;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .back-btn {
            font-size: 24px;
            color: #007aff;
            cursor: pointer;
            width: 32px;
            text-align: center;
        }
        .header-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .contact-name {
            font-size: 17px;
            font-weight: 600;
            color: #000;
        }
        .contact-status {
            font-size: 12px;
            color: #5c5c5e;
            margin-top: 2px;
        }
        .call-btn {
            font-size: 20px;
            color: #007aff;
            cursor: pointer;
        }

        .action-bar {
            padding: 8px 16px;
            background: #f5f5f7;
            display: flex;
            gap: 12px;
            border-bottom: 0.5px solid #e5e5ea;
            flex-shrink: 0;
        }
        .action-btn {
            background: #e9e9ef;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #007aff;
            cursor: pointer;
        }
        .action-btn:active { background: #d1d1d6; }

        .api-section {
            padding: 10px 16px;
            background: #f9f9fb;
            border-bottom: 0.5px solid #e5e5ea;
            flex-shrink: 0;
        }
        .api-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .api-input-group label {
            font-size: 0.7rem;
            font-weight: 500;
            color: #007aff;
            background: #e3f2fd;
            padding: 4px 12px;
            border-radius: 20px;
        }
        #apiKeyInput {
            flex: 1;
            padding: 8px 14px;
            border: 0.5px solid #c6c6c8;
            border-radius: 28px;
            font-size: 0.8rem;
            background: white;
            outline: none;
        }
        #apiKeyInput:focus { border-color: #007aff; }
        .save-key-btn {
            background: #007aff;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            font-size: 0.7rem;
        }
        .status-badge {
            margin-top: 6px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #5c5c5e;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c6c6c8;
        }
        .status-dot.active { background: #34c759; }
        .clear-btn {
            background: none;
            border: none;
            font-size: 0.6rem;
            color: #007aff;
            margin-left: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }
        .assistant-message { align-self: flex-start; }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            background: #e9e9ef;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .user-message .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .bubble {
            background: #e5e5ea;
            color: #000;
            border-bottom-left-radius: 4px;
        }
        
        .recall-message {
            align-self: center;
            max-width: 90%;
        }
        .recall-message .bubble {
            background: #e9e9ef;
            color: #8e8e93;
            font-size: 0.7rem;
            text-align: center;
            padding: 6px 12px;
            border-radius: 20px;
        }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 8px 0;
            z-index: 1000;
            display: none;
            min-width: 140px;
        }
        .context-menu button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            text-align: left;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .context-menu button:active { background: #e5e5ea; }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }
        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #8e8e93;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,60%,100%{ opacity:0.3; } 30%{ opacity:1; } }

        .input-area {
            padding: 12px 16px 16px;
            background: #f5f5f7;
            border-top: 0.5px solid #e5e5ea;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-wrapper {
            flex: 1;
            background: #ffffff;
            border-radius: 28px;
            border: 0.5px solid #e5e5ea;
        }
        #messageInput {
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: transparent;
            border-radius: 28px;
            font-size: 0.95rem;
            resize: none;
            font-family: inherit;
            outline: none;
        }
        #sendBtn {
            background: #007aff;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        #sendBtn.disabled { background: #c6c6c8; pointer-events: none; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 顶部导航栏：备注名 A_d老师111 -->
    <div class="chat-header">
        <div class="back-btn" onclick="history.back()">←</div>
        <div class="header-info">
            <div class="contact-name">A_d老师111</div>
            <div class="contact-status">DeepSeek AI · 在线</div>
        </div>
        <div class="call-btn">📞</div>
    </div>

    <div class="action-bar">
        <button class="action-btn" id="regenerateBtn">🔄 重说</button>
        <button class="action-btn" id="clearChatBtn">🗑 清空对话</button>
    </div>

    <div class="api-section">
        <div class="api-input-group">
            <label>🔑 API Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx">
            <button class="save-key-btn" id="saveKeyBtn">保存</button>
        </div>
        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">未配置密钥</span>
            <button class="clear-btn" id="clearKeyBtn">清除</button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="iMessage 输入..."></textarea>
        </div>
        <button id="sendBtn">➤</button>
    </div>
</div>

<div id="contextMenu" class="context-menu">
    <button id="recallMsgBtn">💬 撤回这条消息</button>
</div>

<script>
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearKeyBtn = document.getElementById('clearKeyBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const regenerateBtn = document.getElementById('regenerateBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const contextMenu = document.getElementById('contextMenu');
    const recallMsgBtn = document.getElementById('recallMsgBtn');

    let currentApiKey = '';
    let isLoading = false;
    let conversationHistory = [];
    let lastUserMessage = null;
    let currentLongPressMsgId = null;
    let messageIdCounter = 0;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function genId() { return Date.now() + '-' + (messageIdCounter++); }

    function addRecallMessage() {
        const recallDiv = document.createElement('div');
        recallDiv.className = 'message recall-message';
        recallDiv.innerHTML = `<div class="bubble">我撤回了一条消息</div>`;
        chatMessagesDiv.appendChild(recallDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function addMessageToUI(role, content, msgId = null) {
        const div = document.createElement('div');
        const finalId = msgId || genId();
        div.setAttribute('data-msg-id', finalId);
        div.setAttribute('data-role', role);
        div.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
        
        const avatarHtml = role === 'user' 
            ? '<div class="avatar"><img src="Q小狐柚.png" alt="我" onerror="this.src=\'\'; this.innerText=\'🐱\'"></div>'
            : '<div class="avatar"><img src="d老师111.jpeg" alt="AI" onerror="this.src=\'\'; this.innerText=\'🤖\'"></div>';
        
        div.innerHTML = `${avatarHtml}<div class="bubble">${escapeHtml(content)}</div>`;
        
        if (role === 'user') {
            let pressTimer;
            div.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    showContextMenu(e, div, finalId);
                }, 500);
            });
            div.addEventListener('touchend', () => clearTimeout(pressTimer));
            div.addEventListener('touchmove', () => clearTimeout(pressTimer));
            div.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showContextMenu(e, div, finalId);
            });
        }
        
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        return { id: finalId, element: div };
    }

    function showContextMenu(event, element, msgId) {
        currentLongPressMsgId = msgId;
        let x, y;
        if (event.touches) {
            x = event.touches[0].clientX;
            y = event.touches[0].clientY;
        } else {
            x = event.clientX;
            y = event.clientY;
        }
        contextMenu.style.display = 'block';
        contextMenu.style.left = x + 'px';
        contextMenu.style.top = y + 'px';
        setTimeout(() => document.addEventListener('click', hideContextMenu), 100);
    }

    function hideContextMenu() {
        contextMenu.style.display = 'none';
        document.removeEventListener('click', hideContextMenu);
    }

    function recallMessage() {
        if (!currentLongPressMsgId) return;
        const targetMsg = document.querySelector(`[data-msg-id="${currentLongPressMsgId}"]`);
        if (!targetMsg) return;
        
        const index = conversationHistory.findIndex(msg => msg.id === currentLongPressMsgId);
        if (index !== -1) {
            conversationHistory.splice(index, 1);
            if (conversationHistory[index+1]?.role === 'assistant') {
                conversationHistory.splice(index+1, 1);
            }
        }
        targetMsg.remove();
        addRecallMessage();
        hideContextMenu();
        const lastUser = [...conversationHistory].reverse().find(m => m.role === 'user');
        lastUserMessage = lastUser ? lastUser.content : null;
    }

    recallMsgBtn.addEventListener('click', recallMessage);

    function renderFullHistory() {
        chatMessagesDiv.innerHTML = '';
        if (conversationHistory.length === 0) {
            const welcome = document.createElement('div');
            welcome.className = 'message assistant-message';
            welcome.innerHTML = '<div class="avatar"><img src="d老师111.jpeg" alt="AI" onerror="this.src=\'\'; this.innerText=\'🤖\'"></div><div class="bubble">你好！保存 API Key 后就可以开始对话啦 ✨<br>长按自己的消息可以撤回~</div>';
            chatMessagesDiv.appendChild(welcome);
        } else {
            conversationHistory.forEach(msg => {
                if (msg.role !== 'system') {
                    addMessageToUI(msg.role, msg.content, msg.id);
                }
            });
        }
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    async function callDeepSeek(userMsg) {
        if (!currentApiKey) throw new Error('请先保存 API Key');
        const messages = [
            { role: 'system', content: '你是 DeepSeek AI 助手，用简洁友好的风格回答问题。' },
            ...conversationHistory.filter(m => m.role !== 'system').slice(-10),
            { role: 'user', content: userMsg }
        ];
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentApiKey}` },
            body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: 0.7 })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${res.status}`);
        }
        const data = await res.json();
        return data.choices[0].message.content;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant-message';
        typingDiv.innerHTML = `<div class="avatar"><img src="d老师111.jpeg" alt="AI" onerror="this.src=\'\'; this.innerText=\'🤖\'"></div><div class="bubble typing-indicator"><span></span><span></span><span></span></div>`;
        chatMessagesDiv.appendChild(typingDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    function hideTyping() { if (typingDiv) { typingDiv.remove(); typingDiv = null; } }

    async function sendMessage(userText = null, isRegenerate = false) {
        if (isLoading) return;
        let text = userText !== null ? userText : messageInput.value.trim();
        if (!text) return;
        if (!currentApiKey) { alert('请先保存 API Key'); return; }
        
        if (!isRegenerate) {
            messageInput.value = '';
            const userMsgObj = addMessageToUI('user', text);
            conversationHistory.push({ role: 'user', content: text, id: userMsgObj.id });
            lastUserMessage = text;
        } else {
            const lastAssistantIndex = [...conversationHistory].reverse().findIndex(m => m.role === 'assistant');
            if (lastAssistantIndex !== -1) {
                const realIndex = conversationHistory.length - 1 - lastAssistantIndex;
                const removed = conversationHistory.splice(realIndex, 1)[0];
                if (removed && removed.id) {
                    const elem = document.querySelector(`[data-msg-id="${removed.id}"]`);
                    if (elem) elem.remove();
                }
            }
        }
        
        isLoading = true;
        sendBtn.classList.add('disabled');
        showTyping();
        try {
            const reply = await callDeepSeek(lastUserMessage);
            hideTyping();
            const assistantObj = addMessageToUI('assistant', reply);
            conversationHistory.push({ role: 'assistant', content: reply, id: assistantObj.id });
        } catch (err) {
            hideTyping();
            addMessageToUI('assistant', `⚠️ 错误：${err.message}`);
        } finally {
            isLoading = false;
            sendBtn.classList.remove('disabled');
            messageInput.focus();
        }
    }

    function regenerateLast() {
        if (isLoading) return;
        if (!lastUserMessage) { alert('没有可以重说的消息'); return; }
        sendMessage(lastUserMessage, true);
    }

    function clearConversation() {
        if (isLoading) return;
        conversationHistory = [];
        lastUserMessage = null;
        renderFullHistory();
    }

    function updateApiKeyUI() {
        const stored = localStorage.getItem('deepseek_api_key');
        if (stored && stored.startsWith('sk-')) {
            currentApiKey = stored;
            apiKeyInput.value = '••••••••••••••••';
            statusDot.classList.add('active');
            statusText.innerText = '密钥已就绪 ✅';
            clearKeyBtn.style.display = 'inline-block';
        } else {
            currentApiKey = '';
            apiKeyInput.value = '';
            statusDot.classList.remove('active');
            statusText.innerText = '未配置密钥';
            clearKeyBtn.style.display = 'none';
        }
    }

    function saveApiKey() {
        let key = apiKeyInput.value.trim();
        if (key === '••••••••••••••••' && currentApiKey) return;
        if (!key.startsWith('sk-')) { alert('请填写有效的 DeepSeek API Key'); return; }
        localStorage.setItem('deepseek_api_key', key);
        currentApiKey = key;
        updateApiKeyUI();
        apiKeyInput.value = '••••••••••••••••';
        alert('✅ API Key 已保存');
    }

    function clearApiKey() {
        localStorage.removeItem('deepseek_api_key');
        currentApiKey = '';
        updateApiKeyUI();
        apiKeyInput.value = '';
    }
    
    saveKeyBtn.addEventListener('click', saveApiKey);
    clearKeyBtn.addEventListener('click', clearApiKey);
    sendBtn.addEventListener('click', () => sendMessage());
    regenerateBtn.addEventListener('click', regenerateLast);
    clearChatBtn.addEventListener('click', clearConversation);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !isLoading && messageInput.value.trim()) {
            e.preventDefault();
            sendMessage();
        }
    });
    function autoResize() { messageInput.style.height = 'auto'; messageInput.style.height = Math.min(messageInput.scrollHeight, 80) + 'px'; }
    messageInput.addEventListener('input', autoResize);
    
    updateApiKeyUI();
    renderFullHistory();
</script>
</body>
</html>
